name: Build Native Binary

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "kiri/**"
      - ".github/workflows/build-native.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: kiri-linux-amd64
            binary: dist/kiri
          - os: macos-14
            artifact: kiri-macos-arm64
            binary: dist/kiri
          - os: windows-2022
            artifact: kiri-windows-amd64
            binary: dist/kiri.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: kiri

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: pip install pyinstaller

      - name: Install Kiri
        # llama-cpp-python is excluded from the PyInstaller bundle (too large
        # on macOS with Metal).  Install base deps only; L3 fails-open.
        run: pip install -e "."

      - name: Build binary (onefile — macOS / Windows)
        if: matrix.os != 'ubuntu-22.04'
        run: pyinstaller packaging/kiri.spec --onefile --distpath dist --workpath /tmp/pyinstaller-work

      - name: Build binary (onedir — Linux, PyTorch makes onefile > 2 GB)
        if: matrix.os == 'ubuntu-22.04'
        run: pyinstaller packaging/kiri.spec --onedir --distpath dist --workpath /tmp/pyinstaller-work

      - name: Smoke test
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            bin="dist/kiri/kiri"
          else
            bin="${{ matrix.binary }}"
            bin="${bin//\\//}"
          fi
          ./"$bin" --help
          ./"$bin" serve --help
          ./"$bin" install --help
          ./"$bin" status --help

      - name: Package Linux binary as zip
        if: matrix.os == 'ubuntu-22.04'
        working-directory: kiri/dist
        run: zip -r kiri-linux-amd64.zip kiri/

      - name: Upload artifact (Linux zip)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: kiri/dist/kiri-linux-amd64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifact (macOS / Windows)
        if: matrix.os != 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: kiri/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/kiri-linux-amd64/kiri-linux-amd64.zip
            artifacts/kiri-macos-arm64/kiri
            artifacts/kiri-windows-amd64/kiri.exe
