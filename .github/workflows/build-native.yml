name: Build Native Binary

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "kiri/**"
      - ".github/workflows/build-native.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: kiri-linux-amd64
            binary: dist/kiri
          - os: macos-14
            artifact: kiri-macos-arm64
            binary: dist/kiri
          - os: windows-2022
            artifact: kiri-windows-amd64
            binary: dist/kiri.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: kiri

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: pip install pyinstaller

      - name: Install Kiri with native extras
        # CPU-only llama-cpp-python — no CUDA/Metal flags in CI.
        # GPU builds are left to end users (documented in README).
        run: pip install -e ".[native]"

      - name: Build binary
        run: pyinstaller packaging/kiri.spec --distpath dist --workpath /tmp/pyinstaller-work

      - name: Smoke test binary
        shell: bash
        run: |
          binary="${{ matrix.binary }}"
          # On Windows the path uses backslash; normalise for bash
          binary="${binary//\\//}"
          ./"$binary" --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: kiri/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 30

  release:
    # Only runs when a tag is pushed; waits for all three builds to succeed.
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/kiri-linux-amd64/kiri
            artifacts/kiri-macos-arm64/kiri
            artifacts/kiri-windows-amd64/kiri.exe
