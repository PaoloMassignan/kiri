name: Publish Docker image

on:
  push:
    branches: [main]        # → ghcr.io/…/kiri:main (and :latest)
    tags: ['v*.*.*']        # → ghcr.io/…/kiri:1.2.3  and  :1.2

env:
  REGISTRY: ghcr.io

jobs:
  # Gate: unit tests must pass before we push any image.
  # Duplicates ci.yml intentionally — the Docker publish should be self-contained
  # and never push a broken image even if ci.yml is skipped or fails silently.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kiri/pyproject.toml
      - name: Install
        working-directory: kiri
        run: pip install -e ".[dev]"
      - name: Unit tests
        working-directory: kiri
        run: python -m pytest tests/unit/ -q --tb=short

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets Buildx produce arm64 images on an amd64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase owner (ghcr.io requires it)
      - name: Set image name
        run: |
          echo "IMAGE=$(echo '${{ env.REGISTRY }}/${{ github.repository_owner }}/kiri' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      # Generates tags:
      #   push to main  → :latest  :main
      #   push v1.2.3   → :1.2.3  :1.2  :1  :latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./kiri
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — layers reused across runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
