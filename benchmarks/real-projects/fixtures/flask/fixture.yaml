project: flask
repo: https://github.com/pallets/flask
version: "3.1.1"
commit: "7b89b4c"
language: python
description: >
  Lightweight WSGI web application framework. Flask and its Scaffold base class
  are the core abstractions a company would register if they ship a Flask-based
  internal platform with custom routing or extension hooks.

protected_symbols:
  - text: "Flask"
    label: "CLASS_NAME"
  - text: "Scaffold"
    label: "CLASS_NAME"

source_files:
  - filename: "flask.py"
    content: |
      class Flask(Scaffold):
          def __init__(self, import_name, static_url_path=None, static_folder=None,
                       template_folder="templates", instance_path=None,
                       instance_relative_config=False, root_path=None):
              super().__init__(
                  import_name=import_name,
                  static_folder=static_folder,
                  static_url_path=static_url_path,
                  template_folder=template_folder,
                  root_path=root_path,
              )
              self.instance_path = instance_path or self._get_instance_path()
              self.config = self.make_config(instance_relative_config)
              self.extensions = {}
              self._before_request_funcs = {}
              self._after_request_funcs = {}
              self._teardown_request_funcs = {}
              self._error_handler_spec = {}

          def make_config(self, instance_relative=False):
              root = self.root_path if not instance_relative else self.instance_path
              return self.config_class(root, self.default_config)

          def make_response(self, rv):
              if isinstance(rv, self.response_class):
                  return rv
              if isinstance(rv, tuple):
                  rv, status, headers = rv + (None,) * (3 - len(rv))
              else:
                  status = headers = None
              if isinstance(rv, (str, bytes, bytearray)):
                  rv = self.response_class(rv, status=status)
              if status is not None:
                  rv.status_code = status
              if headers:
                  rv.headers.update(headers)
              return rv

          def wsgi_app(self, environ, start_response):
              ctx = self.request_context(environ)
              error = None
              try:
                  ctx.push()
                  response = self.full_dispatch_request()
              except Exception as e:
                  error = e
                  response = self.handle_exception(e)
              finally:
                  ctx.pop(error)
              return response(environ, start_response)

