project: gin
repo: https://github.com/gin-gonic/gin
version: "1.10.0"
commit: "c9b8a93"
language: go
description: >
  High-performance HTTP web framework for Go. Engine is the core router and
  server; RouterGroup is the building block for versioned or scoped route trees.
  A company shipping an internal Go API platform on Gin would protect both.

protected_symbols:
  - text: "Engine"
    label: "CLASS_NAME"
  - text: "RouterGroup"
    label: "CLASS_NAME"

source_files:
  - filename: "gin.go"
    content: |
      type Engine struct {
          RouterGroup
          RedirectTrailingSlash  bool
          RedirectFixedPath      bool
          HandleMethodNotAllowed bool
          ForwardedByClientIP    bool
          UseRawPath             bool
          UnescapePathValues     bool
          MaxMultipartMemory     int64
          trees                  methodTrees
          pool                   sync.Pool
          allNoRoute             HandlersChain
          allNoMethod            HandlersChain
          noRoute                HandlersChain
          noMethod               HandlersChain
          maxParams              uint16
          secureJSONPrefix       string
          HTMLRender             render.HTMLRender
          FuncMap                template.FuncMap
          delims                 render.Delims
          trustedProxies         []string
          trustedCIDRs           []*net.IPNet
          ContextWithFallback    bool
      }

      func New() *Engine {
          debugPrintWARNINGNew()
          engine := &Engine{
              RouterGroup: RouterGroup{
                  Handlers: nil,
                  basePath: "/",
                  root:     true,
              },
              FuncMap:               template.FuncMap{},
              RedirectTrailingSlash: true,
              RedirectFixedPath:     false,
              HandleMethodNotAllowed: false,
              ForwardedByClientIP:   true,
              UnescapePathValues:    true,
              MaxMultipartMemory:    defaultMultipartMemory,
              trees:                 make(methodTrees, 0, 9),
              delims:                render.Delims{Left: "{{", Right: "}}"},
              secureJSONPrefix:      "while(1);",
          }
          engine.RouterGroup.engine = engine
          engine.pool.New = func() any {
              return engine.allocateContext(engine.maxParams)
          }
          return engine
      }

      func (engine *Engine) ServeHTTP(w http.ResponseWriter, req *http.Request) {
          c := engine.pool.Get().(*Context)
          c.writermem.reset(w)
          c.Request = req
          c.reset()
          engine.handleHTTPRequest(c)
          engine.pool.Put(c)
      }

      type RouterGroup struct {
          Handlers HandlersChain
          basePath string
          engine   *Engine
          root     bool
      }

      func (group *RouterGroup) Group(relativePath string, handlers ...HandlerFunc) *RouterGroup {
          return &RouterGroup{
              Handlers: group.combineHandlers(handlers),
              basePath: group.calculateAbsolutePath(relativePath),
              engine:   group.engine,
          }
      }

      func (group *RouterGroup) Use(middleware ...HandlerFunc) IRoutes {
          group.Handlers = append(group.Handlers, middleware...)
          return group.returnObj()
      }

      func (group *RouterGroup) handle(httpMethod, relativePath string, handlers HandlersChain) IRoutes {
          absolutePath := group.calculateAbsolutePath(relativePath)
          handlers = group.combineHandlers(handlers)
          group.engine.addRoute(httpMethod, absolutePath, handlers)
          return group.returnObj()
      }

