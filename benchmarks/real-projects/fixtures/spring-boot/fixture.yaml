project: spring-boot
repo: https://github.com/spring-projects/spring-boot
version: "3.3.4"
commit: "4f8a21c"
language: java
description: >
  Convention-over-configuration Java application framework. SpringApplication
  and ApplicationContext are the bootstrap and container abstractions — an
  enterprise team building a shared internal platform on Spring Boot would
  protect these symbols.

protected_symbols:
  - text: "SpringApplication"
    label: "CLASS_NAME"
  - text: "ApplicationContext"
    label: "CLASS_NAME"

source_files:
  - filename: "SpringApplication.java"
    content: |
      public class SpringApplication {

          private Class<?>[] primarySources;
          private Set<String> sources = new LinkedHashSet<>();
          private Class<?> mainApplicationClass;
          private Banner.Mode bannerMode = Banner.Mode.CONSOLE;
          private boolean logStartupInfo = true;
          private boolean addCommandLineProperties = true;
          private boolean addConversionService = true;
          private boolean headless = true;
          private boolean registerShutdownHook = true;
          private List<ApplicationContextInitializer<?>> initializers;
          private List<ApplicationListener<?>> listeners;
          private Map<String, Object> defaultProperties;
          private List<BootstrapRegistryInitializer> bootstrapRegistryInitializers;
          private Set<String> additionalProfiles = Collections.emptySet();
          private boolean allowBeanDefinitionOverriding = false;
          private boolean allowCircularReferences = false;
          private WebApplicationType webApplicationType;

          public SpringApplication(Class<?>... primarySources) {
              this(null, primarySources);
          }

          public SpringApplication(ResourceLoader resourceLoader, Class<?>... primarySources) {
              this.resourceLoader = resourceLoader;
              Assert.notNull(primarySources, "PrimarySources must not be null");
              this.primarySources = new LinkedHashSet<>(Arrays.asList(primarySources));
              this.webApplicationType = WebApplicationType.deduceFromClasspath();
              this.bootstrapRegistryInitializers = new ArrayList<>(getSpringFactoriesInstances(BootstrapRegistryInitializer.class));
              setInitializers((Collection) getSpringFactoriesInstances(ApplicationContextInitializer.class));
              setListeners((Collection) getSpringFactoriesInstances(ApplicationListener.class));
              this.mainApplicationClass = deduceMainApplicationClass();
          }

          public ConfigurableApplicationContext run(String... args) {
              Startup startup = Startup.create();
              if (this.registerShutdownHook) {
                  SpringApplication.shutdownHook.enableShutdownHookAddition();
              }
              DefaultBootstrapContext bootstrapContext = createBootstrapContext();
              ConfigurableApplicationContext context = null;
              configureHeadlessProperty();
              SpringApplicationRunListeners listeners = getRunListeners(args);
              listeners.starting(bootstrapContext, this.mainApplicationClass);
              try {
                  ApplicationArguments applicationArguments = new DefaultApplicationArguments(args);
                  ConfigurableEnvironment environment = prepareEnvironment(listeners, bootstrapContext, applicationArguments);
                  Banner printedBanner = printBanner(environment);
                  context = createApplicationContext();
                  context.setApplicationStartup(this.applicationStartup);
                  prepareContext(bootstrapContext, context, environment, listeners, applicationArguments, printedBanner);
                  refreshContext(context);
                  afterRefresh(context, applicationArguments);
                  startup.started();
                  listeners.started(context, startup.timeTakenToStarted());
                  callRunners(context, applicationArguments);
              } catch (Throwable ex) {
                  throw handleRunFailure(context, ex, listeners);
              }
              return context;
          }
      }

hard_cases:
  - id: spring-boot-h001
    scenario: renamed_class
    expected_action: REDACT
    expected_layer: L1
    description: "SpringApplication renamed to PlatformLauncher — same run() flow, L2 misses"
    prompt: |
      Can you explain the lifecycle in this launcher's run() method? I want
      to understand the order: environment preparation, context creation,
      context refresh, and runner callbacks.

      public class PlatformLauncher {
          private Class<?>[] primarySources;
          private WebApplicationType webApplicationType;
          private boolean registerShutdownHook = true;
          private ApplicationStartup applicationStartup = ApplicationStartup.DEFAULT;

          public PlatformLauncher(Class<?>... primarySources) {
              this.primarySources = new LinkedHashSet<>(Arrays.asList(primarySources));
              this.webApplicationType = WebApplicationType.deduceFromClasspath();
              setInitializers((Collection) getSpringFactoriesInstances(ApplicationContextInitializer.class));
              setListeners((Collection) getSpringFactoriesInstances(ApplicationListener.class));
          }

          public ConfigurableApplicationContext run(String... args) {
              DefaultBootstrapContext bootstrapContext = createBootstrapContext();
              ConfigurableApplicationContext context = null;
              SpringApplicationRunListeners listeners = getRunListeners(args);
              listeners.starting(bootstrapContext, this.mainApplicationClass);
              try {
                  ApplicationArguments applicationArguments = new DefaultApplicationArguments(args);
                  ConfigurableEnvironment environment = prepareEnvironment(listeners, bootstrapContext, applicationArguments);
                  context = createApplicationContext();
                  context.setApplicationStartup(this.applicationStartup);
                  prepareContext(bootstrapContext, context, environment, listeners, applicationArguments, null);
                  refreshContext(context);
                  afterRefresh(context, applicationArguments);
                  callRunners(context, applicationArguments);
              } catch (Throwable ex) {
                  throw handleRunFailure(context, ex, listeners);
              }
              return context;
          }
      }

  - id: spring-boot-h002
    scenario: partial_snippet
    expected_action: REDACT
    expected_layer: L1
    description: "run() method body fragment — bootstrap context and listener lifecycle"
    prompt: |
      Why does the run method create a DefaultBootstrapContext separately from
      the main application context? What is its role and when is it closed?

          DefaultBootstrapContext bootstrapContext = createBootstrapContext();
          ConfigurableApplicationContext context = null;
          configureHeadlessProperty();
          SpringApplicationRunListeners listeners = getRunListeners(args);
          listeners.starting(bootstrapContext, this.mainApplicationClass);
          try {
              ApplicationArguments applicationArguments = new DefaultApplicationArguments(args);
              ConfigurableEnvironment environment = prepareEnvironment(listeners, bootstrapContext, applicationArguments);
              context = createApplicationContext();
              prepareContext(bootstrapContext, context, environment, listeners, applicationArguments, printedBanner);
              refreshContext(context);
              afterRefresh(context, applicationArguments);
              callRunners(context, applicationArguments);
          } catch (Throwable ex) {
              throw handleRunFailure(context, ex, listeners);
          }
          return context;

cases:
  - id: spring-boot-001
    scenario: explain
    expected_action: REDACT
    description: "Developer asks how SpringApplication.run bootstraps ApplicationContext"
    prompt: |
      Can you explain what happens between SpringApplication.run() being called
      and the first @Bean being available? I'm trying to understand when the
      ApplicationContext is fully refreshed vs when listeners fire.

      public static void main(String[] args) {
          SpringApplication app = new SpringApplication(PlatformApplication.class);
          app.setBannerMode(Banner.Mode.OFF);
          app.addListeners(new ApplicationPidFileWriter());
          ApplicationContext context = app.run(args);

          log.info("Started {} beans", context.getBeanDefinitionCount());
      }

  - id: spring-boot-002
    scenario: use
    expected_action: REDACT
    description: "Developer asks how to access ApplicationContext beans in a batch job"
    prompt: |
      I need to run a nightly Spring Batch job from the command line without
      starting the full HTTP server. I'm using SpringApplication to bootstrap
      only the batch context:

      ApplicationContext context = SpringApplication.run(BatchConfiguration.class, args);
      JobLauncher launcher = context.getBean(JobLauncher.class);
      Job importJob = context.getBean("importOrdersJob", Job.class);

      How do I pass runtime parameters to the job and handle exit codes correctly?

  - id: spring-boot-003
    scenario: refactor
    expected_action: REDACT
    description: "Developer asks to add profile support to a SpringApplication entry point"
    prompt: |
      Refactor our main class to activate the correct Spring profile based on an
      environment variable and fail fast with a clear error if the variable is missing:

      @SpringBootApplication
      public class Application {
          public static void main(String[] args) {
              SpringApplication.run(Application.class, args);
          }
      }

  - id: spring-boot-004
    scenario: pass
    expected_action: PASS
    description: "Developer asks about JPA composite key — no protected symbols"
    prompt: |
      How do I map a legacy database table with a two-column composite primary
      key using JPA annotations? The table is called order_lines and uses
      order_id + line_number as its PK.

      @Embeddable
      public class OrderLineId implements Serializable {
          @Column(name = "order_id")
          private Long orderId;

          @Column(name = "line_number")
          private Integer lineNumber;

          // equals and hashCode required by JPA spec
          @Override
          public boolean equals(Object o) { ... }

          @Override
          public int hashCode() { ... }
      }

      @Entity
      @Table(name = "order_lines")
      public class OrderLine {
          @EmbeddedId
          private OrderLineId id;

          private String productCode;
          private BigDecimal quantity;
      }
