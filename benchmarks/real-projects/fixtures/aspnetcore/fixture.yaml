project: aspnetcore
repo: https://github.com/dotnet/aspnetcore
version: "8.0.10"
commit: "3e7a91d"
language: csharp
description: >
  Microsoft's open-source ASP.NET Core framework. WebApplication and
  WebApplicationBuilder are the minimal hosting API introduced in .NET 6 —
  an enterprise team shipping an internal platform or API gateway on ASP.NET
  Core would protect these two symbols.

protected_symbols:
  - text: "WebApplication"
    label: "CLASS_NAME"
  - text: "WebApplicationBuilder"
    label: "CLASS_NAME"

source_files:
  - filename: "WebApplication.cs"
    content: |
      public sealed class WebApplication : IHost, IApplicationBuilder, IEndpointRouteBuilder, IAsyncDisposable
      {
          internal const string GlobalEndpointRouteBuilderKey = "__GlobalEndpointRouteBuilder";
          internal const string EndpointRouteBuilderKey = "__EndpointRouteBuilder";

          private readonly IHost _host;
          private readonly List<EndpointDataSource> _dataSources = new();

          internal WebApplication(IHost host)
          {
              _host = host;
              ApplicationBuilder = new ApplicationBuilder(host.Services, ServerFeatures);
              Logger = host.Services.GetRequiredService<ILoggerFactory>()
                  .CreateLogger(Environment.ApplicationName ?? nameof(WebApplication));
              Properties[GlobalEndpointRouteBuilderKey] = this;
          }

          public static WebApplicationBuilder CreateBuilder() =>
              new WebApplicationBuilder(new WebApplicationOptions());

          public static WebApplicationBuilder CreateBuilder(string[] args) =>
              new WebApplicationBuilder(new WebApplicationOptions { Args = args });

          public static WebApplication Create(string[]? args = null) =>
              new WebApplicationBuilder(new WebApplicationOptions { Args = args }).Build();

          public Task StartAsync(CancellationToken cancellationToken = default) =>
              _host.StartAsync(cancellationToken);

          public Task StopAsync(CancellationToken cancellationToken = default) =>
              _host.StopAsync(cancellationToken);

          public Task RunAsync(string? url = null)
          {
              Listen(url);
              return HostingAbstractionsHostExtensions.RunAsync(this, default);
          }

          public void Run(string? url = null)
          {
              Listen(url);
              HostingAbstractionsHostExtensions.Run(this);
          }

          public ValueTask DisposeAsync() => ((IAsyncDisposable)_host).DisposeAsync();
      }

  - filename: "WebApplicationBuilder.cs"
    content: |
      public sealed class WebApplicationBuilder
      {
          private readonly HostApplicationBuilder _hostApplicationBuilder;
          private readonly ServiceDescriptor _genericWebHostServiceDescriptor;

          private WebApplication? _builtApplication;

          internal WebApplicationBuilder(WebApplicationOptions options, Action<IHostBuilder>? configureDefaults = null)
          {
              var configuration = new ConfigurationManager();
              configuration.AddEnvironmentVariables(prefix: "ASPNETCORE_");
              _hostApplicationBuilder = new HostApplicationBuilder(new HostApplicationBuilderSettings
              {
                  Args = options.Args,
                  ApplicationName = options.ApplicationName,
                  EnvironmentName = options.EnvironmentName,
                  ContentRootPath = options.ContentRootPath,
                  Configuration = configuration,
              });
              _genericWebHostServiceDescriptor = InitializeWebHostSettings(options);
          }

          public ConfigurationManager Configuration => _hostApplicationBuilder.Configuration;
          public IServiceCollection Services => _hostApplicationBuilder.Services;
          public ILoggingBuilder Logging => _hostApplicationBuilder.Logging;
          public IWebHostEnvironment Environment { get; }
          public IHostBuilder Host => _hostApplicationBuilder;

          public WebApplication Build()
          {
              _hostApplicationBuilder.Services.Add(_genericWebHostServiceDescriptor);
              var host = _hostApplicationBuilder.Build();
              return _builtApplication = new WebApplication(host);
          }
      }

hard_cases:
