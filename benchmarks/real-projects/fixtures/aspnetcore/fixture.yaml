    scenario: renamed_class
    expected_action: REDACT
    expected_layer: L1
    description: "WebApplication renamed to ApiGateway — same IHost wrapper + CreateBuilder/Run, L2 misses"
    prompt: |
      I'm looking at our internal gateway class and I don't understand why
      CreateBuilder is a static factory on the class itself rather than a
      separate factory type. Can you explain the relationship between
      ApiGateway and ApiGatewayBuilder?

      public sealed class ApiGateway : IHost, IApplicationBuilder, IEndpointRouteBuilder, IAsyncDisposable
      {
          private readonly IHost _host;
          private readonly List<EndpointDataSource> _dataSources = new();

          internal ApiGateway(IHost host)
          {
              _host = host;
              ApplicationBuilder = new ApplicationBuilder(host.Services, ServerFeatures);
              Logger = host.Services.GetRequiredService<ILoggerFactory>()
                  .CreateLogger(Environment.ApplicationName ?? nameof(ApiGateway));
              Properties["__GlobalEndpointRouteBuilder"] = this;
          }

          public static ApiGatewayBuilder CreateBuilder() =>
              new ApiGatewayBuilder(new GatewayOptions());

          public static ApiGatewayBuilder CreateBuilder(string[] args) =>
              new ApiGatewayBuilder(new GatewayOptions { Args = args });

          public static ApiGateway Create(string[]? args = null) =>
              new ApiGatewayBuilder(new GatewayOptions { Args = args }).Build();

          public Task StartAsync(CancellationToken cancellationToken = default) =>
              _host.StartAsync(cancellationToken);

          public Task StopAsync(CancellationToken cancellationToken = default) =>
              _host.StopAsync(cancellationToken);

          public void Run(string? url = null)
          {
              Listen(url);
              HostingAbstractionsHostExtensions.Run(this);
          }

          public ValueTask DisposeAsync() => ((IAsyncDisposable)_host).DisposeAsync();
      }

