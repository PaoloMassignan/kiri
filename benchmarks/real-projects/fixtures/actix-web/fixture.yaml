project: actix-web
repo: https://github.com/actix/actix-web
version: "4.9.0"
commit: "f2d3c81"
language: rust
description: >
  High-performance async web framework for Rust. HttpServer manages the
  Tokio worker pool and TLS; App is the per-worker application builder.
  A company shipping a Rust-based API service on actix-web would protect both.

protected_symbols:
  - text: "HttpServer"
    label: "CLASS_NAME"
  - text: "App"
    label: "CLASS_NAME"

source_files:
  - filename: "server.rs"
    content: |
      pub struct HttpServer<F, I, S, B> {
          pub(crate) factory: F,
          worker_config: ServerWorkerConfig,
          backlog: u32,
          sockets: Vec<Socket>,
          builder: ServerBuilder,
          on_connect_fn: Option<Arc<dyn Fn(&dyn Any, &mut Extensions) + Send + Sync>>,
          _phantom: PhantomData<(I, S, B)>,
      }

      impl<F, I, S, B> HttpServer<F, I, S, B> {
          pub fn new(factory: F) -> Self {
              HttpServer {
                  factory,
                  worker_config: ServerWorkerConfig::default(),
                  backlog: 1024,
                  sockets: Vec::new(),
                  builder: ServerBuilder::default(),
                  on_connect_fn: None,
                  _phantom: PhantomData,
              }
          }

          pub fn workers(mut self, num: usize) -> Self {
              self.builder = self.builder.num_workers(num);
              self
          }

          pub fn shutdown_timeout(mut self, sec: u64) -> Self {
              self.builder = self.builder.shutdown_timeout(sec);
              self
          }

          pub fn bind<A: net::ToSocketAddrs>(mut self, addrs: A) -> io::Result<Self> {
              let sockets = bind_addrs(addrs, self.backlog)?;
              self.sockets.extend(sockets);
              Ok(self)
          }

          pub async fn run(self) -> io::Result<()> {
              let sockets = self.sockets;
              let factory = self.factory;
              let config = self.worker_config;
              self.builder
                  .configure(move |sb| {
                      for socket in &sockets {
                          let factory = factory.clone();
                          let config = config.clone();
                          sb.listen(socket.clone(), move || {
                              build_service(factory.clone(), config.clone())
                          });
                      }
                  })
                  .run()
                  .await
          }
      }

  - filename: "app.rs"
    content: |
      pub struct App<T> {
          endpoint: T,
          services: Vec<Box<dyn AppServiceFactory>>,
          default: Option<Rc<HttpNewService>>,
          factory_ref: Rc<RefCell<Option<AppRoutingFactory>>>,
          extensions: Extensions,
          external: Vec<ResourceDef>,
          error_handlers: Rc<ErrorHandlers<BoxBody>>,
      }

      impl App<AppEntry> {
          pub fn new() -> Self {
              let fref = Rc::new(RefCell::new(None));
              App {
                  endpoint: AppEntry::new(fref.clone()),
                  services: Vec::new(),
                  default: None,
                  factory_ref: fref,
                  extensions: Extensions::new(),
                  external: Vec::new(),
                  error_handlers: Rc::new(ErrorHandlers::new()),
              }
          }
      }

      impl<T> App<T> {
          pub fn app_data<U: 'static>(mut self, ext: U) -> Self {
              self.extensions.insert(ext);
              self
          }

          pub fn service<F>(mut self, factory: F) -> Self
          where
              F: HttpServiceFactory + 'static,
          {
              self.services.push(Box::new(factory));
              self
          }

          pub fn wrap<M, B>(
              self,
              mw: M,
          ) -> App<impl ServiceFactory<ServiceRequest, Config = (), Response = ServiceResponse<B>, Error = Error, InitError = ()>>
          where
              M: Transform<T::Service, ServiceRequest, Response = ServiceResponse<B>, Error = Error, InitError = ()> + 'static,
              B: MessageBody,
          {
              App {
                  endpoint: apply(mw, self.endpoint),
                  services: self.services,
                  default: self.default,
                  factory_ref: self.factory_ref,
                  extensions: self.extensions,
                  external: self.external,
                  error_handlers: self.error_handlers,
              }
          }
      }

hard_cases:
  - id: actix-web-h001
    scenario: renamed_class
    expected_action: REDACT
    expected_layer: L1
    description: "HttpServer renamed to WebServer — same struct layout + workers/bind/run, L2 misses"
    prompt: |
      Our internal server builder stores a factory closure plus worker_config,
      backlog, sockets, and a ServerBuilder. workers() delegates to
      builder.num_workers(), bind() calls bind_addrs() and extends sockets,
      and run() configures each socket listener via builder.configure().

      pub struct WebServer<F, I, S, B> {
          pub(crate) factory: F,
          worker_config: ServerWorkerConfig,
          backlog: u32,
          sockets: Vec<Socket>,
          builder: ServerBuilder,
          on_connect_fn: Option<Arc<dyn Fn(&dyn Any, &mut Extensions) + Send + Sync>>,
          _phantom: PhantomData<(I, S, B)>,
      }

      impl<F, I, S, B> WebServer<F, I, S, B> {
          pub fn new(factory: F) -> Self {
              WebServer {
                  factory,
                  worker_config: ServerWorkerConfig::default(),
                  backlog: 1024,
                  sockets: Vec::new(),
                  builder: ServerBuilder::default(),
                  on_connect_fn: None,
                  _phantom: PhantomData,
              }
          }

          pub fn workers(mut self, num: usize) -> Self {
              self.builder = self.builder.num_workers(num);
              self
          }

          pub fn bind<A: net::ToSocketAddrs>(mut self, addrs: A) -> io::Result<Self> {
              let sockets = bind_addrs(addrs, self.backlog)?;
              self.sockets.extend(sockets);
              Ok(self)
          }

          pub async fn run(self) -> io::Result<()> {
              let sockets = self.sockets;
              let factory = self.factory;
              let config = self.worker_config;
              self.builder
                  .configure(move |sb| {
                      for socket in &sockets {
                          let factory = factory.clone();
                          sb.listen(socket.clone(), move || {
                              build_service(factory.clone(), config.clone())
                          });
                      }
                  })
                  .run()
                  .await
          }
      }

  - id: actix-web-h002
    scenario: partial_snippet
    expected_action: REDACT
    expected_layer: L1
    description: "App::new() and service() body without struct name — per-worker factory pattern"
    prompt: |
      Why is factory_ref wrapped in Rc<RefCell<Option<...>>> and then shared
      between App and AppEntry? What gets written into it during the service
      registration phase and when is it first read?

          let fref = Rc::new(RefCell::new(None));
          App {
              endpoint: AppEntry::new(fref.clone()),
              services: Vec::new(),
              default: None,
              factory_ref: fref,
              extensions: Extensions::new(),
              external: Vec::new(),
              error_handlers: Rc::new(ErrorHandlers::new()),
          }

          pub fn service<F>(mut self, factory: F) -> Self
          where
              F: HttpServiceFactory + 'static,
          {
              self.services.push(Box::new(factory));
              self
          }

cases:
  - id: actix-web-001
    scenario: explain
    expected_action: REDACT
    description: "Developer asks how HttpServer distributes workers and how App is cloned"
    prompt: |
      I'm trying to understand why state shared between workers must be wrapped
      in Arc. Can you explain how HttpServer creates one App instance per worker
      thread and what the closure passed to HttpServer::new must guarantee?

      let server = HttpServer::new(move || {
          App::new()
              .app_data(web::Data::new(db_pool.clone()))
              .app_data(web::Data::new(config.clone()))
              .wrap(middleware::Logger::default())
              .wrap(middleware::Compress::default())
              .service(web::scope("/api/v1").configure(api_v1::config))
              .service(web::scope("/api/v2").configure(api_v2::config))
      })
      .workers(num_cpus::get())
      .shutdown_timeout(30)
      .bind(("127.0.0.1", 8080))?
      .run()
      .await?;

  - id: actix-web-002
    scenario: use
    expected_action: REDACT
    description: "Developer asks how to add TLS to an HttpServer"
    prompt: |
      Our App is currently running on plain HTTP in staging. How do I configure
      HttpServer with rustls to enable HTTPS in production while keeping HTTP
      available on a different port for internal health checks?

      let server = HttpServer::new(|| {
          App::new()
              .service(web::resource("/health").to(health_check))
              .service(web::scope("/api").configure(api_config))
      })
      .bind("0.0.0.0:8080")?
      .run()
      .await?;

  - id: actix-web-003
    scenario: refactor
    expected_action: REDACT
    description: "Developer asks to refactor a handler that panics on db errors"
    prompt: |
      Refactor this actix-web handler to return proper HTTP error responses
      instead of panicking on database failures. The App routes requests to
      this handler via .service(web::resource("/users/{id}").to(get_user)).

      async fn get_user(
          pool: web::Data<PgPool>,
          path: web::Path<i32>,
      ) -> impl Responder {
          let user_id = path.into_inner();
          let user = sqlx::query_as!(User,
              "SELECT id, name, email FROM users WHERE id = $1", user_id
          )
          .fetch_one(pool.get_ref())
          .await
          .unwrap();  // panics if user not found or DB error
          HttpResponse::Ok().json(user)
      }

  - id: actix-web-004
    scenario: pass
    expected_action: PASS
    description: "Developer asks about Tokio connection pools — no protected symbols"
    prompt: |
      How do I create a PostgreSQL connection pool in Rust using sqlx and share
      it safely across async tasks without using global state?

      use sqlx::postgres::PgPoolOptions;

      #[tokio::main]
      async fn main() -> Result<(), sqlx::Error> {
          let pool = PgPoolOptions::new()
              .max_connections(20)
              .acquire_timeout(std::time::Duration::from_secs(3))
              .connect(&std::env::var("DATABASE_URL").expect("DATABASE_URL not set"))
              .await?;

          let row: (i64,) = sqlx::query_as("SELECT COUNT(*) FROM users")
              .fetch_one(&pool)
              .await?;

          println!("Users: {}", row.0);
          Ok(())
      }
