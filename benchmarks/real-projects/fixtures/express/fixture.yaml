project: express
repo: https://github.com/expressjs/express
version: "4.21.1"
commit: "b2a8a84"
language: javascript
description: >
  Fast, unopinionated Node.js web framework. Router and Application are the
  two central classes — a company shipping an internal Node.js platform or
  BFF layer built on Express would protect these.

protected_symbols:
  - text: "Router"
    label: "CLASS_NAME"
  - text: "Application"
    label: "CLASS_NAME"

source_files:
  - filename: "application.js"
    content: |
      Application.prototype.handle = function handle(req, res, callback) {
        const router = this._router;
        const done = callback || finalhandler(req, res, {
          env: this.get('env'),
          onerror: logerror.bind(this),
        });
        if (!router) {
          done();
          return;
        }
        router.handle(req, res, done);
      };

      Application.prototype.use = function use(fn) {
        let offset = 0;
        let path = '/';
        if (typeof fn !== 'function') {
          let arg = fn;
          while (Array.isArray(arg) && arg.length !== 0) {
            arg = arg[0];
          }
          if (typeof arg !== 'function') {
            offset = 1;
            path = fn;
          }
        }
        const callbacks = flatten(slice.call(arguments, offset));
        if (callbacks.length === 0) {
          throw new TypeError('Application.use() requires a middleware function');
        }
        this.lazyrouter();
        const router = this._router;
        callbacks.forEach(function (fn) {
          router.use(path, function mounted_app(req, res, next) {
            const orig = req.app;
            fn.handle(req, res, function (err) {
              setPrototypeOf(req, orig.request);
              setPrototypeOf(res, orig.response);
              next(err);
            });
          });
        });
        return this;
      };

hard_cases:
  - id: express-h001
    scenario: renamed_class
    expected_action: REDACT
    expected_layer: L1
    description: "Application renamed to AppCore — same handle/use logic, L2 misses"
    prompt: |
      Can you explain why the handle method checks for this._router before
      calling router.handle? What happens when there are no routes registered?

      AppCore.prototype.handle = function handle(req, res, callback) {
        const router = this._router;
        const done = callback || finalhandler(req, res, {
          env: this.get('env'),
          onerror: logerror.bind(this),
        });
        if (!router) {
          done();
          return;
        }
        router.handle(req, res, done);
      };

      AppCore.prototype.use = function use(fn) {
        let offset = 0;
        let path = '/';
        if (typeof fn !== 'function') {
          let arg = fn;
          while (Array.isArray(arg) && arg.length !== 0) {
            arg = arg[0];
          }
          if (typeof arg !== 'function') {
            offset = 1;
            path = fn;
          }
        }
        const callbacks = flatten(slice.call(arguments, offset));
        if (callbacks.length === 0) {
          throw new TypeError('use() requires a middleware function');
        }
        this.lazyrouter();
        const router = this._router;
        callbacks.forEach(function (fn) {
          router.use(path, function mounted_app(req, res, next) {
            const orig = req.app;
            fn.handle(req, res, function (err) {
              setPrototypeOf(req, orig.request);
              setPrototypeOf(res, orig.response);
              next(err);
            });
          });
        });
        return this;
      };

