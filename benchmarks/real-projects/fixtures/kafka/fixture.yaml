  - id: kafka-004
    scenario: pass
    expected_action: PASS
    description: "Developer asks about idempotent consumer pattern — no protected symbols"
    prompt: |
      What is the cleanest way to implement idempotent message processing in Java
      so that replaying the same event twice has no side effects?

      public class IdempotentOrderProcessor {
          private final Set<String> processedIds = ConcurrentHashMap.newKeySet();

          public void process(String messageId, OrderEvent event) {
              if (!processedIds.add(messageId)) {
                  log.debug("Skipping duplicate event: {}", messageId);
                  return;
              }
              orderRepository.save(Order.from(event));
          }
      }
